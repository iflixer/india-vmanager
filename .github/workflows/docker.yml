name: Build and Push Docker Image

on:
  push:
    branches: [ master ]
    tags: [ '*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit and tag
        id: vars
        run: |
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "tag=$(git describe --tags --always)" >> $GITHUB_OUTPUT

      - name: Build & Push 
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/india-vmanager:latest
            ghcr.io/${{ github.repository_owner }}/india-vmanager:${{ steps.vars.outputs.tag }}
          build-args: |
            SOURCE_COMMIT=${{ steps.vars.outputs.commit }}
            SOURCE_TAG=${{ steps.vars.outputs.tag }}

      - name: Notify Telegram
        if: success()
        env:
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: |
          MESSAGE=$(cat << 'EOF'
          ✅ *Docker образы собраны и опубликованы, НАДО ДЕПЛОИТЬ!*

          👤 Автор пуша: `${{ github.actor }}`
          💬 Комментарий к пушу:
          `${{ github.event.head_commit.message }}`

          📦 Образы:
          - `ghcr.io/${{ github.repository_owner }}/india-vmanager:latest`
          - `ghcr.io/${{ github.repository_owner }}/india-vmanager:${{ steps.vars.outputs.tag }}`

          💾 Коммит: `${{ steps.vars.outputs.commit }}`
          🏷️ Тег: `${{ steps.vars.outputs.tag }}`
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TG_CHAT_ID" \
              --arg text "$MESSAGE" \
              --arg mode "Markdown" \
              '{chat_id: $chat_id, text: $text, parse_mode: $mode}')"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"${{ secrets.TG_CHAT_ID }}"'",
              "parse_mode": "Markdown",
              "text": "❌ *Ошибка в GitHub Actions Workflow!*\n\n🧑 Автор: ${{ github.actor }}\n📝 Commit: `${{ github.sha }}`",
              "reply_markup": {
                "inline_keyboard": [[
                  {
                    "text": "📄 Открыть лог",
                    "url": "'"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'"
                  }
                ]]
              }
            }'